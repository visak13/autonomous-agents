# =============================================================================
# WRITE-FILE shape — the single-document write plan (planner-only strategy).
# =============================================================================
# CoT-autonomy P5: this shape now OWNS the write-plan authoring strategy that used
# to live in engine constants (agentic.py:_ONE_WRITE_NODE_DIRECTIVE + the strategy
# halves of _compose_write_goal). Shapes are step-by-step plan-AUTHORING guidance
# read ONLY by the planner (incremental.py routes decompose_methodology into
# planner prompts exclusively); worker/reviewer nodes never see this text — their
# behavior comes from their briefs, specializations and bundle doctrine.

name = "write-file"

description = "A WRITE-FILE plan: ONE node authors the whole document into a single deliverable file (accumulating it part by part within the node), plus ONE final_review reviewer node bound to the same specialization. Select for any goal whose outcome is a written document/file."

# One node in flight at a time — the reviewer follows the writer.
execution = "sequential"

decompose_methodology = """
Author the write plan as ONE coherent document:
- EXACTLY ONE write node (role 'worker') that authors the WHOLE document into the
  single deliverable file, accumulating it part by part within the node — the
  'sections' are that one node's within-node structure, never separate nodes. Never
  author one node per section, and never chain whole-document nodes (a chain
  re-emits and duplicates the document).
- Author that node's BRIEF yourself: the goal, the deliverable file name, the format
  specialization to bind, and a NON-EMPTY source_ids list naming every [S#] from the
  SOURCE INDEX whose facts the document uses (never source_ids: []). Ground every
  part in a listed source: a part with no supporting source is dropped or marked
  UNSUPPORTED in one line, never invented; every citation carries a real [S#] or its
  URL — never a worded stand-in such as '[Source Placeholder]', 'Source URL for X',
  'TBD' or similar filler. Do not plan a 'sources to be added later' section.
- EXACTLY ONE 'final_review' node (role 'reviewer') that depends_on the write node,
  briefed by you the same way — with the SAME format specialization and the SAME
  source grounding the writer received: a reviewer reviews against the specs its
  worker wrote to, reads the finished file itself, fixes grounded defects in place,
  and reports an honest final status.
Author these two nodes and no others, then finalize the plan.
"""
